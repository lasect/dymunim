version: "3.8"

services:
  postgres:
    image: quay.io/tembo/pgmq-pg:latest
    container_name: dymunim-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dymunim
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dymunim"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
